<!doctype html><html lang="it"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta http-equiv="Cache-Control" content="no-store"><title>Pulizia cache Spesa Pronta</title></head><body style="font-family:Inter,Arial,sans-serif;display:grid;place-items:center;min-height:100vh;background:linear-gradient(135deg,#eef6ff,#ffffff);color:#0b1d37;margin:0"><main style="text-align:center;max-width:560px;padding:24px"><h1 style="font-size:2rem;margin:0 0 10px">Pulizia cache completata</h1><p style="font-weight:700;color:#526b91;line-height:1.45">Sto scollegando il vecchio service worker e caricando la V27.9 aggiornata. I dati utente non vengono cancellati.</p><button id="go" style="margin-top:18px;border:0;border-radius:18px;background:#1266f1;color:white;font-weight:900;padding:16px 22px;font-size:1rem">Apri Spesa Pronta aggiornata</button></main><script>(async()=>{try{if('serviceWorker' in navigator){const regs=await navigator.serviceWorker.getRegistrations();for(const r of regs){await r.unregister();}}if(window.caches){const ks=await caches.keys();for(const k of ks){await caches.delete(k);}}}catch(e){}function go(){location.replace('/?v=279999&t='+Date.now())}document.getElementById('go').onclick=go;setTimeout(go,1800);})();</script></body></html>
