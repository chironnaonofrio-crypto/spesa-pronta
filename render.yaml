services:
  - type: web
    name: spesa-pronta
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    disk:
      name: spesa-pronta-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /var/data
