services:
  - type: web
    name: spesa-pronta
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5.5
      - key: OPENAI_VISION_MODEL
        value: gpt-5.5
      - key: OPENAI_MODEL_FALLBACKS
        value: gpt-5.5,gpt-5.4-mini,gpt-5.4-nano
      - key: OPENAI_TIMEOUT_MS
        value: 60000
      - key: DB_PATH
        value: ./cloud-db.json
      - key: SPESA_MEMORY_MODE
        value: light
      - key: SPESA_RAM_SAFE
        value: true
      - key: DISABLE_GOOGLE_HTML_SCRAPE
        value: 1
      - key: GPU_VISION_ENABLED
        value: true
      - key: MAX_MEMORY_CACHE
        value: 120
      - key: MAX_DIAGNOSTIC_EVENTS
        value: 50
      - key: MAX_GLOBAL_PRODUCTS
        value: 800
      - key: MAX_PRODUCT_PHOTOS
        value: 2
      - key: MAX_STORED_DATA_URL_CHARS
        value: 0
      - key: PRESERVE_GLB_DATA_URL
        value: true
      - key: MAX_STORED_GLB_DATA_URL_CHARS
        value: 24000000

# V31.6: conserva anteprime leggere anche in RAM-safe (non foto enormi)
# MAX_STORED_THUMB_DATA_URL_CHARS=140000
# MAX_PRODUCT_PHOTOS=8

      - key: SPESA_ALLOW_SINGLE_VIEW_3D
        value: 0
      - key: SPESA_REQUIRE_CLEAN_MASK_FOR_GLB
        value: 1
