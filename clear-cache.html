<!doctype html><html lang='it'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><meta http-equiv='Cache-Control' content='no-store, no-cache, must-revalidate, max-age=0'><meta http-equiv='Pragma' content='no-cache'><meta http-equiv='Expires' content='0'><title>Pulizia cache Spesa Pronta V27.35</title></head><body style='font-family:Inter,Arial,sans-serif;display:grid;place-items:center;min-height:100vh;background:linear-gradient(135deg,#eef6ff,#ffffff);color:#0b1d37;margin:0'><main style='text-align:center;max-width:680px;padding:24px'><h1 style='font-size:2rem;margin:0 0 10px'>Cache pulita ✅</h1><p style='font-weight:800;color:#526b91;line-height:1.45'>Ho eliminato cache, service worker vecchio e riferimenti alle versioni vecchie. Ora apri Spesa Pronta V27.35.</p><p style='font-weight:900;color:#123f8a'>Versione attesa: V27.35 Clean Version Lock</p><button id='go' style='margin-top:18px;border:0;border-radius:18px;background:#1266f1;color:white;font-weight:900;padding:16px 22px;font-size:1rem'>Apri Spesa Pronta V27.35</button></main><script>(async()=>{try{if('serviceWorker' in navigator){const regs=await navigator.serviceWorker.getRegistrations();for(const r of regs){await r.unregister();}}if(window.caches){const ks=await caches.keys();for(const k of ks){await caches.delete(k);}}localStorage.setItem('spesaProntaLastCleanVersion','V27.35');sessionStorage.clear();}catch(e){}const go=()=>location.replace('/?v=2735&t='+Date.now());document.getElementById('go').onclick=go;setTimeout(go,900);})();</script></body></html>
